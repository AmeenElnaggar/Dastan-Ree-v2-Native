<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Details — Dastan Real Estate</title>
    <link rel="icon" type="image/svg+xml" href="../../../src/assets/images/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../../../src/styles/variables.css" />
    <link rel="stylesheet" href="../../../src/styles/global.css" />
    <link rel="stylesheet" href="../../../src/styles/utilities.css" />
    <link
      rel="stylesheet"
      href="../../../src/shared/components/navbar/navbar.css" />
    <link
      rel="stylesheet"
      href="../../../src/shared/components/footer/footer.css" />
    <link
      rel="stylesheet"
      href="../../../src/shared/components/modal/modal.css" />
    <link
      rel="stylesheet"
      href="../../../src/shared/components/project-card/project-card.css" />
    <link
      rel="stylesheet"
      href="/src/pages/project-details/project-details.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../../tailwind.config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>
  <body class="font-sans bg-white text-gray-900">
    <div id="navbar-root"></div>
    <div class="navbar-spacer"></div>

    <!-- Property Top Section -->
    <section class="property-top">
      <div class="property-top-container">
        <div class="property-top-left">
          <div class="property-title-row">
            <img
              class="property-dev-logo"
              id="property-dev-logo"
              src=""
              alt="" />
            <h1 class="property-title" id="property-title"></h1>
          </div>
          <p class="property-short-desc" id="property-short-desc"></p>
        </div>
        <div class="property-top-right">
          <div class="property-price-tag" id="property-price"></div>
          <div class="property-finishing-date" id="property-finishing"></div>
        </div>
      </div>
    </section>

    <!-- Property Gallery -->
    <section class="property-gallery">
      <div class="property-gallery-hero">
        <img id="gallery-hero-img" class="property-gallery-hero-img" src="" alt="" />
      </div>
      <div class="property-gallery-thumbs" id="gallery-thumbs"></div>
    </section>

    <!-- Main Content + Sidebar -->
    <div class="property-content-area">
      <div class="property-content-row">
        <!-- Main Column -->
        <div class="property-content-main">
          <div class="property-section">
            <h3 class="property-section-title">Key Details</h3>
            <div class="property-details-grid" id="property-details"></div>
          </div>

          <div class="property-section">
            <h3 class="property-section-title">Overview</h3>
            <div class="property-overview" id="property-overview"></div>
          </div>

          <div class="property-section" id="amenities-section">
            <h3 class="property-section-title">Amenities</h3>
            <div class="property-amenities-grid" id="property-amenities"></div>
            <div id="property-facilities-block"></div>
            <div id="property-purposes-block"></div>
          </div>

          <!-- Floor Plans (Section 5) -->
          <div class="property-section" id="floor-plans-section">
            <h3 class="property-section-title">Floor Plans</h3>
            <div class="floor-plans-list" id="floor-plans-list"></div>
          </div>

          <!-- Map (Section 6) -->
          <div class="property-section" id="map-section">
            <h3 class="property-section-title">Explore the Area</h3>
            <div class="property-map" id="property-map"></div>
          </div>

          <!-- Similar Projects (Section 7) -->
          <div class="property-section property-section--related">
            <h3 class="property-section-title">Similar Projects</h3>
            <div class="similar-projects-grid" id="similar-projects-grid"></div>
          </div>
        </div>

        <!-- Sidebar -->
        <div class="property-content-sidebar">
          <div id="property-agent"></div>
        </div>
      </div>
    </div>

    <!-- Modal & Footer -->
    <div id="modal-root"></div>
    <div id="footer-root"></div>

    <script
      type="module"
      src="../../../src/shared/components/navbar/Navbar.js"></script>
    <script
      type="module"
      src="../../../src/shared/components/footer/Footer.js"></script>
    <script
      type="module"
      src="../../../src/shared/components/modal/Modal.js"></script>
    <script
      type="module"
      src="/src/pages/project-details/project-details.js"></script>
  </body>
</html>
